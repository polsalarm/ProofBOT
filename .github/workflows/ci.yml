name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Contracts and frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test root deployment safeguards
        run: pnpm test:config

      - name: Compile contract
        run: pnpm contracts:compile

      - name: Test contract
        run: pnpm contracts:test

      - name: Test frontend
        run: pnpm web:test

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build production frontend
        run: pnpm build
        env:
          # Build-only placeholders exercise strict production validation. They
          # are never deployment records and this workflow does not publish.
          NEXT_PUBLIC_PROOFBOT_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000001"
          NEXT_PUBLIC_PROOFBOT_DEPLOYMENT_BLOCK: "0"
